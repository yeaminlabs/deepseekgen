<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>SNBD Host Chat Helper</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-xl bg-white p-6 rounded shadow">
        <h1 class="text-2xl font-bold mb-4">SNBD Host Chat Helper</h1>
        <p class="mb-4">Hello, world!</p>
        <label class="block mb-2 text-sm font-semibold">API Key
            <input type="password" id="apiKey" class="w-full border rounded p-2" />
        </label>
        <textarea id="prompt" rows="4" class="w-full border rounded p-2 mb-4" placeholder="Enter your prompt"></textarea>
        <button onclick="sendPrompt()" class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded">Send</button>
        <pre id="response" class="whitespace-pre-wrap mt-4"></pre>
    </div>
    <script>
        async function sendPrompt() {
            const key = document.getElementById('apiKey').value;
            const prompt = document.getElementById('prompt').value;
            const output = document.getElementById('response');
            output.textContent = 'Waiting for response...';
            try {
                const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + key,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'mistral/mistral-7b-instruct',
                        messages: [
                            { role: 'system', content: 'You are a helpful assistant.' },
                            { role: 'user', content: prompt }
                        ]
                    })
                });
                const data = await res.json();
                output.textContent = data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content ? data.choices[0].message.content : JSON.stringify(data, null, 2);
            } catch (err) {
                output.textContent = 'Error: ' + err;
            }
        }
    </script>
</body>
</html>
